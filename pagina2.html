<!--<body background> sirve para tener una imagen como fondo en la pagina web-->
<html>
    <head>
        <title>Etapa 2</title>
    </head>
    <body background="vscode.png">
    <font size="12" color="000000" face="Arial"><b>Etapa 2 en HTML.</b></font><br>
<!--<form> sirve para crear un formulario. action define la dirección del archivo que procesará los datos del formulario.
method define el método de envío de los datos del formulario, puede ser get o post. <ul> sirve para crear una lista no ordenada.
<li> sirve para crear un elemento de lista. <label> sirve para definir una etiqueta para un elemento de formulario. for sirve para asociar una etiqueta con un campo
de entrada. <input> sirve para crear un campo de entrada de datos. type sirve para definir el tipo de campo de entrada. id sirve para identificar el campo de entrada.
<textarea> sirve para crear un área de texto: id sirve para identificar el área de texto. name sirve para nombrar el área de texto.
<fieldset> sirve para agrupar elementos de formulario. <legend> sirve para definir una leyenda
para un grupo de elementos de formulario. -->
    <hr align ="left" width="50%" size="5" noshade>
    <form action="index.html" method="post">
    <ul>
        <li>
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="user_name" />
        </li>
        <li>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="user_email" />
        </li>
        <li>
            <label for="msg">Mensaje:</label>
            <textarea id="msg" name="user_message"></textarea>
        </li>
        <li>
            <fieldset>
           <legend>Formulario de contacto</legend> 
           <input type="checkbox" name="one">Opción 1<br>
           <input type="checkbox" name="two">Opción 2<br>
           <input type="checkbox" name="three">Opción 3<br>
              </fieldset>
              <fieldset>
                <legend>Formulario de contacto número 2</legend>
                <input type="radio" name="option1">Opción 1<br>
                <input type="radio" name="option2">Opción 2
            </fieldset>
            <input type="submit" name="enviar" value="Enviar" />
        </li>
    </ul>
</form>
<!--Ejemplo de Tabla con imagenes. rowspan sirve para que una celda se extienda por varias filas hacia los lados. colspan sirve para que una celda se extienda por
varias filas hacia abajo. background sirve para poner una imagen como fondo en una celda de la tabla.-->
<hr align ="left" width="50%" size="5" noshade>
<table width="50%" border="1" align="left">
    <caption align="right" valign="top">Ejemplo de tabla con imagenes</caption>
    <tr>
        <td width="200px"> Nombre</td>
        <td rowspan="3" background="web.png"><font size="4" color="FFFFFF" face="Arial">Columna</td>
    </tr>
    <tr>
        <td><img src="web.png" width="150px" height="150px"><br>Imagen y texto</td>
    </tr>
    <tr>
        <td width="150">celda </td>
    </tr>
    <tr>
        <td colspan="2">Fila</td>
    </tr>
</table>
